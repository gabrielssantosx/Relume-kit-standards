<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One</title>
    <title>one</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            background: none;
            font-family: "Roboto", sans-serif;
            font-style: normal;
        }

        header {
            width: 100%;
            height: 72px;
            display: flex;
            padding: 0 64px;
            justify-content: space-between;
            align-items: center;
        }

        header>img {
            width: 80px;
            height: 40px;
        }

        .header-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }

        nav{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
        }

        a {
            font-size: 16px;
            font-weight: 400px;
            color: black;
        }

        nav > button {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        button > p {
            font-size: 16px;
            font-weight: 400;
            color: black;
        }
    
    .btn-wrapper {
        display: flex;
        gap: 16px;
    }

.btn-wrapper > button {
    padding: 8px 20px;
    border: 1px solid black;
}


.btn-secondary {
    background-color: black;
    color: white;
}
    </style>



</head>

<body>
    <header>
        <img src="./assets/images/company-logo.svg" alt="Image logo company">
        <div class="header-nav">
            <nav>
                <a href="">link One</a>
                <a href="">link Two</a>
                <a href="">link Three</a>
                <button>
                    <p>Link four</p>
                    <img src="./assets/images/chevron-down.svg" alt="image chevron down">
                </button>
            </nav>
            <div class="btn-wraper">
                <button>button</button>
                <button class="btn-secondary">button</button>
            </div>
        </div>
    </header>
</body>

</html>
